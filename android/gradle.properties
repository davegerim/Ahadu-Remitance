org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Security (audit #8): keep Dart symbols off-device and obfuscate release snapshots.
# Paths are relative to the Flutter project root (parent of android/).
dart-obfuscation=true
split-debug-info=build/app/outputs/symbols
tree-shake-icons=true
filesystem-scheme=org-dartlang-app
